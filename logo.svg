      <ellipse cx="86" cy="82" rx="8" ry="7" fill="#D8E2F0"/>
<circle cx="-8" cy="50" r="11" fill="#D8E2F0"/>
      <rect x="-8" y="126" width="12" height="54" rx="6" fill="#D8E2F0"/>
