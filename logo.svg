<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101B38"/>
      <stop offset="52%" stop-color="#23467C"/>
      <stop offset="100%" stop-color="#6D86C8"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#F7F9FF" stop-opacity="0.88"/>
      <stop offset="45%" stop-color="#DCE6FF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#DCE6FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#07101F" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <circle cx="512" cy="410" r="230" fill="url(#glow)"/>

  <g opacity="0.16" stroke="#DCE7FF" fill="none">
